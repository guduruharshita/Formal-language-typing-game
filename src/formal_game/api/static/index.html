<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formal Language Typing Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f11; --surface: #18181c; --border: #2a2a32;
      --accent: #7c6af7; --accent2: #a78bfa; --green: #34d399; --red: #f87171;
      --text: #e8e8f0; --muted: #8888a0; --dim: #555568;
      --ff: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--ff); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.04em; color: var(--accent2); margin-bottom: 4px; }
    .subtitle { font-size: 0.75rem; color: var(--muted); margin-bottom: 32px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 100%; max-width: 640px; }
    .card + .card { margin-top: 16px; }
    .difficulty-row { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .diff-btn { background: var(--bg); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 8px 20px; font-family: var(--ff); font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .diff-btn.active, .diff-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
    .start-btn { background: var(--accent); border: none; color: white; border-radius: 9px; padding: 12px 32px; font-family: var(--ff); font-size: 0.9rem; font-weight: 700; cursor: pointer; width: 100%; transition: opacity 0.15s; }
    .start-btn:hover { opacity: 0.85; }
    .timer-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .timer { font-size: 1.8rem; font-weight: 700; color: var(--accent2); font-variant-numeric: tabular-nums; }
    .timer.warn { color: var(--red); }
    .score { font-size: 0.85rem; color: var(--muted); }
    .score span { color: var(--text); font-weight: 700; }
    .category-badge { font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); background: rgba(124,106,247,0.12); padding: 3px 10px; border-radius: 100px; border: 1px solid rgba(124,106,247,0.25); display: inline-block; margin-bottom: 12px; }
    .challenge-label { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 8px; font-family: var(--ff); }
    .challenge-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 6px; }
    .hint { font-size: 0.75rem; color: var(--dim); margin-bottom: 20px; }
    .hint span { color: var(--accent2); }
    input[type=text] { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 9px; padding: 12px 16px; font-family: var(--ff); font-size: 1rem; outline: none; transition: border-color 0.15s; margin-bottom: 12px; }
    input[type=text]:focus { border-color: var(--accent); }
    input[type=text].correct { border-color: var(--green); }
    input[type=text].wrong { border-color: var(--red); }
    .submit-btn { background: var(--accent); border: none; color: white; border-radius: 9px; padding: 11px 28px; font-family: var(--ff); font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .submit-btn:hover { opacity: 0.85; }
    .feedback { font-size: 0.82rem; padding: 10px 14px; border-radius: 8px; margin-top: 10px; }
    .feedback.ok { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
    .feedback.err { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .points-badge { font-size: 0.72rem; color: var(--accent2); float: right; margin-top: 2px; }
    #gameover-card { display: none; text-align: center; }
    .final-score { font-size: 3rem; font-weight: 700; color: var(--accent2); margin: 16px 0 4px; }
    .final-stats { font-size: 0.82rem; color: var(--muted); margin-bottom: 24px; }
    .final-stats b { color: var(--text); }
    .name-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 9px; padding: 10px 14px; font-family: var(--ff); font-size: 0.9rem; outline: none; margin-bottom: 10px; }
    .save-btn { background: var(--green); border: none; color: #0f0f11; border-radius: 9px; padding: 10px 24px; font-family: var(--ff); font-size: 0.85rem; font-weight: 700; cursor: pointer; }
    .save-btn:hover { opacity: 0.85; }
    .play-again { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 9px; padding: 10px 24px; font-family: var(--ff); font-size: 0.85rem; cursor: pointer; margin-left: 8px; }
    .leaderboard { margin-top: 28px; text-align: left; }
    .lb-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--dim); margin-bottom: 12px; }
    .lb-row { display: flex; gap: 12px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    .lb-rank { color: var(--dim); width: 22px; flex-shrink: 0; }
    .lb-name { flex: 1; color: var(--text); }
    .lb-score { color: var(--accent2); font-weight: 700; }
    .lb-diff { font-size: 0.65rem; color: var(--dim); }
    #setup-card { }
    #game-card { display: none; }
  </style>
</head>
<body>
  <h1>Formal Language Typing Game</h1>
  <p class="subtitle">Test your knowledge of regular expressions, context-free languages, and string theory.</p>

  <div class="card" id="setup-card">
    <p style="font-size:0.78rem;color:var(--muted);margin-bottom:12px">Select difficulty:</p>
    <div class="difficulty-row">
      <button class="diff-btn active" data-diff="easy">Easy  (+10 pts)</button>
      <button class="diff-btn" data-diff="medium">Medium  (+15 pts)</button>
      <button class="diff-btn" data-diff="hard">Hard  (+20 pts)</button>
    </div>
    <p style="font-size:0.73rem;color:var(--dim);margin-bottom:20px">Wrong answers cost 5 points. 60 seconds per game.</p>
    <button class="start-btn" id="start-btn">Start Game</button>
  </div>

  <div class="card" id="game-card">
    <div class="timer-row">
      <div class="timer" id="timer">60s</div>
      <div class="score">Score: <span id="score">0</span> &nbsp;·&nbsp; ✓ <span id="correct">0</span> &nbsp;·&nbsp; ✗ <span id="incorrect">0</span></div>
    </div>
    <div id="challenge-area">
      <div class="category-badge" id="category"></div>
      <div class="points-badge" id="points-badge"></div>
      <div class="challenge-label" id="label"></div>
      <div class="challenge-desc" id="desc"></div>
      <div class="hint" id="hint"></div>
    </div>
    <input type="text" id="answer-input" placeholder="Type your answer and press Enter…" autocomplete="off" spellcheck="false" />
    <button class="submit-btn" id="submit-btn">Submit</button>
    <div class="feedback" id="feedback" style="display:none"></div>
  </div>

  <div class="card" id="gameover-card">
    <div style="font-size:0.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.12em">Game Over</div>
    <div class="final-score" id="final-score">0</div>
    <div class="final-stats" id="final-stats"></div>
    <input class="name-input" id="player-name" placeholder="Your name (for leaderboard)…" maxlength="30" />
    <button class="save-btn" id="save-btn">Save Score</button>
    <button class="play-again" id="play-again">Play Again</button>
    <div class="leaderboard" id="leaderboard"></div>
  </div>

  <script>
    const API = '';
    let sessionId = null, difficulty = 'easy', timerInterval = null;
    let score = 0, correct = 0, incorrect = 0;

    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        difficulty = btn.dataset.diff;
      });
    });

    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('submit-btn').addEventListener('click', submitAnswer);
    document.getElementById('answer-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });
    document.getElementById('save-btn').addEventListener('click', saveScore);
    document.getElementById('play-again').addEventListener('click', () => {
      document.getElementById('gameover-card').style.display = 'none';
      document.getElementById('setup-card').style.display = '';
    });

    async function startGame() {
      const res = await fetch(`${API}/api/game/start`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ difficulty })
      });
      const data = await res.json();
      sessionId = data.session_id;
      score = 0; correct = 0; incorrect = 0;
      updateScoreDisplay();
      document.getElementById('setup-card').style.display = 'none';
      document.getElementById('game-card').style.display = '';
      document.getElementById('gameover-card').style.display = 'none';
      document.getElementById('feedback').style.display = 'none';
      showChallenge(data.challenge);
      startTimer(data.remaining_seconds);
      document.getElementById('answer-input').focus();
    }

    function showChallenge(ch) {
      if (!ch) return;
      document.getElementById('category').textContent = ch.category;
      document.getElementById('label').textContent = ch.label;
      document.getElementById('desc').textContent = ch.description;
      document.getElementById('hint').innerHTML = `Hint: <span>${ch.hint}</span>`;
      document.getElementById('points-badge').textContent = `+${ch.points} pts`;
      document.getElementById('answer-input').value = '';
      document.getElementById('answer-input').className = '';
    }

    async function submitAnswer() {
      const answer = document.getElementById('answer-input').value;
      if (!answer.trim() || !sessionId) return;
      const res = await fetch(`${API}/api/game/submit`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ session_id: sessionId, answer })
      });
      const data = await res.json();
      score = data.new_score;
      if (data.correct) correct++; else incorrect++;
      updateScoreDisplay();
      const fb = document.getElementById('feedback');
      fb.textContent = data.explanation;
      fb.className = 'feedback ' + (data.correct ? 'ok' : 'err');
      fb.style.display = '';
      document.getElementById('answer-input').className = data.correct ? 'correct' : 'wrong';
      if (data.finished || !data.next_challenge) {
        clearInterval(timerInterval);
        showGameOver();
      } else {
        setTimeout(() => {
          fb.style.display = 'none';
          showChallenge(data.next_challenge);
          document.getElementById('answer-input').focus();
        }, 900);
      }
    }

    function updateScoreDisplay() {
      document.getElementById('score').textContent = score;
      document.getElementById('correct').textContent = correct;
      document.getElementById('incorrect').textContent = incorrect;
    }

    function startTimer(seconds) {
      clearInterval(timerInterval);
      let remaining = Math.floor(seconds);
      const el = document.getElementById('timer');
      timerInterval = setInterval(() => {
        remaining--;
        el.textContent = remaining + 's';
        el.className = 'timer' + (remaining <= 10 ? ' warn' : '');
        if (remaining <= 0) { clearInterval(timerInterval); showGameOver(); }
      }, 1000);
    }

    function showGameOver() {
      document.getElementById('game-card').style.display = 'none';
      const card = document.getElementById('gameover-card');
      card.style.display = '';
      document.getElementById('final-score').textContent = score;
      document.getElementById('final-stats').innerHTML =
        `<b>${correct}</b> correct &nbsp;·&nbsp; <b>${incorrect}</b> wrong &nbsp;·&nbsp; difficulty: <b>${difficulty}</b>`;
      loadLeaderboard();
    }

    async function saveScore() {
      const name = document.getElementById('player-name').value.trim() || 'Anonymous';
      await fetch(`${API}/api/leaderboard`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, score, correct, difficulty })
      });
      document.getElementById('save-btn').textContent = 'Saved!';
      document.getElementById('save-btn').disabled = true;
      loadLeaderboard();
    }

    async function loadLeaderboard() {
      const res = await fetch(`${API}/api/leaderboard?limit=10`);
      const entries = await res.json();
      const el = document.getElementById('leaderboard');
      if (!entries.length) { el.innerHTML = ''; return; }
      el.innerHTML = '<div class="lb-title">Top Scores</div>' +
        entries.map(e => `
          <div class="lb-row">
            <span class="lb-rank">#${e.rank}</span>
            <span class="lb-name">${e.name}</span>
            <span class="lb-score">${e.score}</span>
            <span class="lb-diff">${e.difficulty}</span>
          </div>`).join('');
    }
  </script>
</body>
</html>
